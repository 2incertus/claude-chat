name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check Python syntax
        run: python -m py_compile app.py

      - name: Check JS syntax
        run: node --check static/js/app.js

  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t claude-chat:test .

      - name: Start container
        run: |
          docker run -d --name claude-chat-test \
            -p 8800:8800 \
            claude-chat:test

      - name: Wait for health
        run: |
          for i in $(seq 1 10); do
            if curl -sf http://localhost:8800/health; then
              echo "Health check passed"
              exit 0
            fi
            sleep 2
          done
          echo "Health check failed"
          exit 1

      - name: Verify static assets served
        run: |
          curl -sf http://localhost:8800/ | grep -q 'app-shell' || exit 1
          curl -sf http://localhost:8800/static/js/app.js | head -1 | grep -q 'function\|use strict' || exit 1
          curl -sf http://localhost:8800/static/css/style.css | head -1 | grep -q 'box-sizing' || exit 1
          curl -sf http://localhost:8800/manifest.json | grep -q 'standalone' || exit 1
          echo "All static assets verified"

      - name: Cleanup
        if: always()
        run: docker rm -f claude-chat-test || true
