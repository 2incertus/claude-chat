<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover">
  <title>Claude Voice Chat</title>
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0A0A0A">
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/static/icon.svg">
  <link rel="stylesheet" href="/static/css/style.css?v=29">
</head>
<body>
<div class="app-shell">

  <!-- ===== Screen 1: Session List ===== -->
  <div class="screen" id="screenList">
    <div class="header">
      <span class="header-title">Claude Sessions</span>
      <span class="header-badge" id="sessionCount">0</span>
      <div class="header-spacer"></div>
      <button class="history-btn" id="historyBtn" title="History"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></button>
      <button class="gear-btn" id="gearBtn" title="Settings"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg></button>
      <button class="new-btn" id="newBtn" title="New session">+</button>
    </div>
    <div class="pull-indicator" id="pullIndicator">Pull to refresh</div>
    <div class="session-list" id="sessionList">
      <div class="empty-state" id="emptyState">
        <div class="empty-state-icon">&#9671;</div>
        <div>No active Claude sessions</div>
        <div style="font-size:0.78rem;color:var(--text-muted);margin-top:4px;">Start a Claude Code session in tmux to see it here</div>
      </div>
    </div>
    <div class="show-hidden-toggle" id="showHiddenToggle" style="display:none;">Show hidden sessions</div>
  </div>

  <!-- ===== Screen 2: Session View ===== -->
  <div class="screen hidden-right" id="screenChat">
    <div class="header">
      <button class="back-btn" id="backBtn">&#8249;</button>
      <span class="session-header-title" id="chatTitle">Session</span>
      <button class="refresh-btn" id="refreshBtn" title="Force refresh"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg></button>
      <button class="bell-btn" id="bellBtn" title="Notify when done"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg></button>
      <div class="status-dot" id="chatStatus"></div>
    </div>
    <div class="chat-feed" id="chatFeed"></div>
    <div class="typing-indicator" id="typingIndicator">
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
      <div class="typing-dot"></div>
    </div>
    <div class="new-msg-pill" id="newMsgPill">New messages</div>
    <div class="preview-bar" id="previewBar">
      <textarea class="preview-text" id="previewText" rows="1"></textarea>
      <button class="preview-send" id="previewSend">Send</button>
      <button class="preview-cancel" id="previewCancel">Cancel</button>
    </div>
    <div class="input-area" id="inputArea">
      <div class="cmd-palette" id="cmdPalette"></div>
      <div class="text-input-row">
        <button class="attach-btn" id="attachBtn" title="Attach file"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg></button>
        <button class="cmd-btn" id="cmdBtn" title="Commands">/</button>
        <textarea class="text-input" id="textInput" rows="1" placeholder="Message..."></textarea>
        <button class="mic-inline-btn" id="micBtn" title="Voice input"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 14a3 3 0 003-3V5a3 3 0 00-6 0v6a3 3 0 003 3zm5-3a5 5 0 01-10 0H5a7 7 0 0014 0h-2zm-4 7.93A7 7 0 0019 12h-2a5 5 0 01-10 0H5a7 7 0 006 6.93V22h2v-3.07z"/></svg></button>
        <button class="send-inline-btn" id="sendBtn" title="Send" style="display:none;"><svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg></button>
      </div>
      <div class="mic-label" id="micLabel"></div>
      <div class="special-keys" id="specialKeys">
        <button class="special-key" data-key="Escape" title="Escape">Esc</button>
        <button class="special-key" data-key="Tab" title="Tab / Accept">Tab</button>
        <button class="special-key" data-key="shift-tab" title="Shift+Tab / Reject">&#8679;Tab</button>
        <button class="special-key" data-key="C-c" title="Ctrl+C / Interrupt">^C</button>
        <button class="special-key" data-key="Up" title="Up arrow">&#9650;</button>
      </div>
    </div>
    <input type="file" id="fileInput" style="display:none;" accept="image/*,application/pdf,.txt,.py,.js,.ts,.json,.md,.csv">
    <div id="uploadToast" style="display:none;position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--surface2);color:var(--text);padding:10px 20px;border-radius:var(--radius-sm);font-size:0.85rem;z-index:50;box-shadow:0 4px 20px rgba(0,0,0,0.5);">Uploading...</div>
  </div>

</div>

<!-- Settings (outside app-shell so position:fixed works correctly) -->
<div class="settings-backdrop" id="settingsBackdrop"></div>
<div class="settings-panel" id="settingsPanel">
  <div class="settings-handle"></div>
  <h3 class="settings-title">Settings</h3>
</div>

<!-- New session panel (outside app-shell) -->
<div class="new-session-backdrop" id="newSessionBackdrop"></div>
<div class="new-session-panel" id="newSessionPanel">
  <div class="settings-handle"></div>
  <h3 class="settings-title">New Session</h3>
  <div id="presetList"></div>
  <div style="margin-top:12px;display:flex;gap:8px;">
    <input type="text" id="customPath" placeholder="Custom path..." style="flex:1;background:var(--surface2);color:var(--text);border:1px solid var(--border-medium);border-radius:8px;padding:8px 12px;font-size:0.85rem;font-family:inherit;outline:none;">
    <button id="customLaunch" style="background:var(--accent);color:white;border:none;border-radius:8px;padding:8px 16px;font-size:0.85rem;font-weight:600;cursor:pointer;touch-action:manipulation;">Launch</button>
  </div>
</div>

<!-- History panel (outside app-shell) -->
<div class="history-backdrop" id="historyBackdrop"></div>
<div class="history-panel" id="historyPanel">
  <div class="settings-handle"></div>
  <h3 class="settings-title">Recently Dismissed</h3>
  <div id="historyList"></div>
</div>

<script>
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/static/sw.js').catch(function() {});
}
</script>
<script src="/static/js/app.js?v=29"></script>
</body>
</html>
